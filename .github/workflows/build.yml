name: Beast-V2-Final-Push
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Build Mod
        run: gradle build --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx2g"

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Beast-V2-Final-Mod
          path: build/libs/*.jar
