name: Beast-V2-Final-Push
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Mod
        # Humne '--no-daemon' hata diya hai aur 'remapJar' ko focus kiya hai
        run: ./gradlew build remapJar -x test --stacktrace

      - name: Upload JAR
        if: always() # Ye sabse important hai, fail hone par bhi file dhoondega
        uses: actions/upload-artifact@v4
        with:
          name: Beast-V2-Final-Mod
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
