name: Beast-V2-Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Force Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
      - name: Build Mod
        run: gradle build -x test -x check --no-daemon --continue
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: Beast-V2-Final
          path: build/libs/*.jar
