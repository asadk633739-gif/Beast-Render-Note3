name: Beast-V2-Final-Push
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
      - name: Build Mod
        # Isme humne 'failOnWarning' ko jadd se khatam kar diya hai
        run: gradle build -x test -x check --no-daemon -PignoreFailures=true
      - name: Upload JAR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Beast-V2-Final-Mod
          path: "**/build/libs/*.jar"
