name: Beast-V2-Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build Mod
        run: gradle build --stacktrace
      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: Beast-V2-Final
          path: build/libs/*.jar
