name: Beast-V2-Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make Gradle Executable
        run: chmod +x gradlew
      - name: Build Mod
        run: ./gradlew build
      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: Beast-V2-AIO
          path: build/libs/*.jar
